<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Панель Администратора | Служба антимонопольного регулирования КР</title>
    <!-- Use basic fonts for governmental look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <div class="login-logo-placeholder"></div>
            <h1>Антимонопольное регулирование КР</h1>
            <p>Панель управления мониторингом цен</p>
        </div>

        <form id="loginForm" class="login-form">
            <div id="errorMsg" class="error-message hidden"></div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="admin@example.com"
                    autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                <span class="btn-text">Войти в систему</span>
                <span class="btn-loader hidden"></span>
            </button>
        </form>

        <div class="login-footer">
            <p>&copy; <span id="currentYear"></span> Служба антимонопольного регулирования при Министерстве экономики и
                коммерции КР</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>

</html>
