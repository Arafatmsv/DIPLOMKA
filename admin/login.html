<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Панель Администратора</title>
    <meta name="description" content="Авторизация в систему мониторинга цен на социально значимые продукты КР">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .login-body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 40%, #1a365d 70%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        .login-body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(74, 144, 217, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 40%, rgba(99, 179, 237, 0.06) 0%, transparent 40%);
            animation: loginBgFloat 20s ease-in-out infinite;
        }

        @keyframes loginBgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -1%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
        }

        /* Grid pattern overlay */
        .login-body::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(74, 144, 217, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 144, 217, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 16px;
            border: 1px solid rgba(226, 232, 240, 0.6);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 0 100px -20px rgba(74, 144, 217, 0.15);
            overflow: hidden;
            animation: loginSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes loginSlideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-header {
            padding: 2.5rem 2.5rem 1.5rem;
            text-align: center;
            border-bottom: none;
            background: linear-gradient(180deg, rgba(74, 144, 217, 0.04) 0%, transparent 100%);
        }

        .login-shield-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.25rem;
            background: linear-gradient(135deg, #4A90D9 0%, #3A7BC8 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px -4px rgba(74, 144, 217, 0.35);
            animation: loginIconPulse 3s ease-in-out infinite;
        }

        @keyframes loginIconPulse {
            0%, 100% { box-shadow: 0 8px 24px -4px rgba(74, 144, 217, 0.35); }
            50% { box-shadow: 0 8px 32px -4px rgba(74, 144, 217, 0.5); }
        }

        .login-shield-icon svg {
            width: 32px;
            height: 32px;
        }

        .login-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 0.35rem;
            letter-spacing: -0.01em;
        }

        .login-header p {
            color: #718096;
            font-size: 0.875rem;
            margin: 0;
            line-height: 1.5;
        }

        .login-form {
            padding: 2rem 2.5rem 1.5rem;
        }

        .login-form .form-group {
            margin-bottom: 1.25rem;
        }

        .login-form .form-group label {
            font-size: 0.8125rem;
            font-weight: 600;
            color: #4a5568;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }

        .login-form input[type="text"],
        .login-form input[type="password"] {
            padding: 0.7rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9375rem;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .login-form input:focus {
            border-color: #4A90D9;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.1);
        }

        .login-form input::placeholder {
            color: #a0aec0;
        }

        .login-btn-submit {
            width: 100%;
            padding: 0.75rem 1.5rem;
            font-size: 0.9375rem;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #4A90D9 0%, #3A7BC8 100%);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .login-btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .login-btn-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px -4px rgba(74, 144, 217, 0.4);
        }

        .login-btn-submit:hover:not(:disabled)::before {
            opacity: 1;
        }

        .login-btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .login-btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-btn-submit .btn-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .login-btn-submit.loading .btn-text-label {
            opacity: 0;
        }

        .login-btn-submit.loading .btn-spinner {
            display: block;
            position: absolute;
        }

        .login-error-msg {
            padding: 0.75rem 1rem;
            background: linear-gradient(135deg, #fff5f5, #fed7d7);
            color: #c53030;
            border: 1px solid #feb2b2;
            border-radius: 10px;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: loginErrorShake 0.4s ease-in-out;
        }

        @keyframes loginErrorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .login-error-msg svg {
            flex-shrink: 0;
        }

        .login-footer {
            text-align: center;
            padding: 1rem 2rem;
            background: #f8fafc;
            border-top: 1px solid #edf2f7;
            font-size: 0.7rem;
            color: #a0aec0;
            line-height: 1.6;
        }

        .login-secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-bottom: 0.25rem;
            font-size: 0.7rem;
            color: #a0aec0;
        }

        .login-secure-badge svg {
            width: 12px;
            height: 12px;
        }

        /* Input icon wrapper */
        .input-icon-group {
            position: relative;
        }

        .input-icon-group svg {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: #a0aec0;
            pointer-events: none;
            transition: stroke 0.2s ease;
        }

        .input-icon-group input {
            padding-left: 2.75rem !important;
        }

        .input-icon-group input:focus + svg,
        .input-icon-group:focus-within svg {
            stroke: #4A90D9;
        }
    </style>
</head>

<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <div class="login-shield-icon">
                <svg fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L3 7L3 11C3 16.55 6.84 21.74 12 23C17.16 21.74 21 16.55 21 11L21 7L12 2Z" fill="white" opacity="0.95"/>
                    <path d="M10 15.5l-3.5-3.5 1.41-1.41L10 12.67l5.59-5.59L17 8.5l-7 7z" fill="rgba(74,144,217,0.8)"/>
                </svg>
            </div>
            <h1>Панель администратора</h1>
            <p>Система мониторинга цен на социально значимые продукты</p>
        </div>

        <form id="loginForm" class="login-form" autocomplete="on">
            <div id="errorMsg" class="login-error-msg hidden">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c53030" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
                </svg>
                <span id="errorText"></span>
            </div>

            <div class="form-group">
                <label for="username">Логин</label>
                <div class="input-icon-group">
                    <input type="text" id="username" name="username" required placeholder="Введите логин"
                        autocomplete="username">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <div class="input-icon-group">
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        autocomplete="current-password">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                </div>
            </div>

            <button type="submit" class="login-btn-submit" id="loginBtn">
                <span class="btn-text-label">Войти в систему</span>
                <span class="btn-spinner"></span>
            </button>
        </form>

        <div class="login-footer">
            <div class="login-secure-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                Защищённое соединение
            </div>
            <p style="margin:0;">&copy; <span id="currentYear"></span> Служба антимонопольного регулирования при Министерстве экономики и коммерции КР</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>

</html>
